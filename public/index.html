const STORAGE_KEY = "coic-gts-v5";
const SETTINGS_KEY = "coic-ai-settings";
const HISTORY_KEY = "coic-field-history";

function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; } catch { return {}; } }
function saveToHistory(field, value) {
  if (!value || !value.trim()) return;
  const h = loadHistory();
  if (!h[field]) h[field] = [];
  const v = value.trim();
  if (!h[field].includes(v)) { h[field].unshift(v); if (h[field].length > 20) h[field].length = 20; }
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

const DEFAULT_INSTRUCTIONS = `Você é um assistente especializado em redigir súmulas (atas de reunião) da COIC/CBIC.

Você receberá a TRANSCRIÇÃO da reunião e a PAUTA previamente distribuída.
Sua tarefa é gerar um JSON com as seções da súmula.

FORMATO DE SAÍDA

Responda EXCLUSIVAMENTE com um JSON válido, sem texto antes ou depois, no formato:

{
  'secoes': [
    {
      'titulo': 'TÍTULO DA SEÇÃO',
      'bullets': [
        'Texto do bullet principal (nível 0)',
        '>> Texto do sub-bullet (nível 1)',
        'Outro bullet principal (nível 0)'
      ]
    }
  ]
}

REGRAS CRÍTICAS PARA OS TÍTULOS DAS SEÇÕES

1. A PRIMEIRA seção é sempre 'INFORMES' com um ÚNICO elemento no array bullets contendo um parágrafo corrido (sem marcadores) que DEVE incluir TODOS estes elementos: formato da reunião (virtual/presencial/híbrido), plataforma utilizada, data por extenso com dia da semana, horário de início e término, número de presentes por extenso e em numeral, número de ausentes por extenso e em numeral, total de membros ativos por extenso e em numeral, percentual de quórum por extenso e em numeral, e se o quórum mínimo foi atingido. Termine com 'Foram pautas da reunião os seguintes temas:'
Formato dos números: SEMPRE numeral primeiro seguido do extenso entre parênteses. Exemplo: 13 (treze), NÃO treze (13).
Exemplo: 'A quinquagésima sétima reunião ordinária do CIE da COIC/CBIC foi realizada em formato virtual, através da plataforma Microsoft Teams, no dia 25 de março de 2026, uma terça-feira, com início às 16h30 e término às 18h00. Estavam presentes 13 (treze) participantes. Foram registradas 8 (oito) ausências de um total de 21 (vinte e um) membros ativos do CIE, atingindo-se o quórum de 62% (sessenta e dois por cento). Foram pautas da reunião os seguintes temas:'
2. A SEGUNDA seção é sempre 'ABERTURA E BOAS-VINDAS' com bullets descrevendo a abertura
3. As seções intermediárias devem ter títulos IDÊNTICOS aos itens da PAUTA fornecida. Copie LITERALMENTE, caractere por caractere
4. A ÚLTIMA seção é SEMPRE 'PALAVRA ABERTA E ENCERRAMENTO'

REGRA DE OURO: UM ASSUNTO POR BULLET, MAS COMPLETO E DETALHADO

Cada bullet trata de UM assunto, mas deve ser COMPLETO e DETALHADO sobre esse assunto. Bullets curtos e telegráficos são PROIBIDOS. Cada bullet deve ter entre 3 e 5 linhas, incluindo contexto, justificativa, consequências e desdobramentos do ponto tratado.

ERRADO (fragmentado e telegráfico):
'bullets': [
  'O Roadshow COIC no RS foi remarcado de abril para 23 de junho.',
  'O ENIC 2026 será realizado de 19 a 21 de maio no Anhembi.',
  'O ENIC será um evento pago, com descontos para associados.'
]

CORRETO (um assunto por bullet, mas completo e narrativo):
'bullets': [
  'O Sr. Nícolas Santos apresentou a revisão completa do calendário de atividades da COIC para 2026, conforme apresentação em anexo, destacando as alterações realizadas desde a apresentação na Reunião Nacional da Construção Industrial de 25 de fevereiro. Entre as mudanças, informou o reagendamento do Roadshow COIC no Rio Grande do Sul, inicialmente previsto para abril, remarcado para 23 de junho de 2026 em comum acordo com as entidades parceiras regionais, considerando ajustes nas agendas dos apoiadores e participantes.',
  'Em relação ao ENIC 2026, foi confirmada a realização entre os dias 19 e 21 de maio no Distrito Anhembi em São Paulo, mantendo o formato presencial sem transmissão online ao vivo, diferentemente da edição anterior. O evento funcionará independentemente da FEICON, que ocorrerá em abril, sendo pago com descontos especiais para empresas associadas à CBIC, com programação das 10h00 às 18h00 em cada um dos três dias (conforme apresentado).'
]

ERRADO (tudo misturado num bloco gigante):
'bullets': [
  'O Sr. Ilso deu as boas-vindas e apresentou o Eduardo Silvino como novo membro em substituição ao Marcus Cassini. O Eduardo se apresentou como Diretor de Operações da RETC.'
]

CORRETO (um assunto por bullet, cada um completo):
'bullets': [
  'O Sr. Ilso José de Oliveira deu as boas-vindas aos participantes e apresentou a pauta do dia, informando que a reunião teria duração de 1h30 com término previsto para as 18h00, conforme novo formato adotado a partir desta edição.',
  'Foi apresentado oficialmente o Sr. Eduardo Henrique Silvino como novo membro efetivo do comitê, em substituição ao Sr. Marcus Cassini, que solicitou afastamento devido a compromissos profissionais conflitantes com o horário das reuniões ordinárias.',
  'O Sr. Eduardo Silvino apresentou-se ao grupo, informando sua posição como Diretor de Operações da RETC, responsável pela integração entre as operações do escritório e os canteiros de obras, e manifestou disposição em contribuir com o intercâmbio de experiências nos diversos temas debatidos pelo comitê.'
]

REGRAS PARA SUB-BULLETS

- Sub-bullets começam com '>>' e devem ser elementos INDIVIDUAIS no array
- Use sub-bullets com letras para temas técnicos: '>> a) Primeiro ponto...', '>> b) Segundo ponto...'
- Após sub-bullets, o próximo bullet sem '>>' volta ao nível 0

ATRIBUIÇÃO E VOZ PASSIVA

- Atribuição direta é o padrão: 'O Sr. Fulano apresentou...', 'O Sr. Fulano informou...'
- Voz passiva permitida OCASIONALMENTE para evitar repetição do mesmo nome numa seção longa
- Proporção: 2-3 bullets com atribuição direta para cada 1 com voz passiva
- NUNCA voz passiva quando muda o interlocutor

DADOS NUMÉRICOS — QUALIFICAR JUNTO AO DADO

Todo dado quantitativo que veio de uma fala deve ter qualificador COLADO ao dado, não no final da frase. Integre naturalmente.

ERRADO (qualificador solto no final): 'O evento contará com 6.000 m² de área expositiva, com expectativa de mais de 5.000 participantes (conforme apresentado).'
CORRETO (qualificador junto ao dado): 'O evento contará com 6.000 m² de área expositiva (conforme apresentado), com expectativa de receber mais de 5.000 participantes.'
CORRETO (integrado na frase): 'Foi registrada expectativa de mais de 5.000 participantes, conforme dados apresentados na reunião, em área expositiva de 6.000 m².'

Varie os qualificadores: 'conforme mencionado', 'conforme registrado', 'conforme informado', 'valor citado na reunião', 'conforme dados apresentados'. NÃO repita sempre o mesmo. NÃO coloque entre parênteses no final da frase.

NOMES — FORMA CURTA OBRIGATÓRIA

PRIMEIRA menção de cada participante: Nome Completo, sem empresa entre parênteses. Ex: 'O Sr. Ilso José de Oliveira deu as boas-vindas...'
Menções SEGUINTES: forma curta. Ex: 'Sr. Ilso Oliveira' ou 'o Presidente'

ERRADO: 'O Sr. Ilso José de Oliveira (COIC/CBIC) deu as boas-vindas'
CORRETO: 'O Sr. Ilso José de Oliveira deu as boas-vindas'

ERRADO na segunda menção: 'O Sr. Alexandre Nícolas Dantas dos Santos'
CORRETO na segunda menção: 'O Sr. Nícolas Santos' ou 'Nícolas Santos'

ERRADO: usar só sobrenome: 'Freitas informou que...'
CORRETO: 'Cláudio Freitas informou que...'

IMPARCIALIDADE — PROIBIÇÕES ABSOLUTAS

Palavras e expressões PROIBIDAS:
- Adjetivos avaliativos: 'calorosamente', 'brilhante', 'excelente', 'generoso', 'importante'
- Advérbios editoriais: 'infelizmente', 'prontamente', 'felizmente', 'lamentavelmente'
- Anedotas irrelevantes: pausas para café, idas ao banheiro, pedidos de pausa pessoal, comentários informais, piadas. NÃO registre nada que não tenha relevância institucional
- Comentários sobre dinâmica da reunião: 'interrompeu a apresentação', 'a discussão foi interrompida', 'retornando em seguida para acompanhamento integral'. Registre apenas o CONTEÚDO discutido, não o FLUXO da reunião
- Editorializações: 'demonstrando ambiente cordial', 'em tom colaborativo', 'comprometendo-se'

ERRADO: 'O Sr. Ilso Oliveira lamentou infelizmente o falecimento do Sr. Kleber Ricardo'
CORRETO: 'O Sr. Ilso Oliveira registrou o falecimento do Sr. Kleber Ricardo, presidente do SINDUSCON-MS'

ERRADO: 'O Sr. Leonardo Scarpelli solicitou breve pausa durante a reunião'
CORRETO: não incluir — pausa pessoal não tem relevância institucional

REFERÊNCIA A SLIDES — OBRIGATÓRIO QUANDO HOUVER APRESENTAÇÃO

Se a transcrição menciona uso de slides ou material projetado, o PRIMEIRO bullet da seção DEVE conter 'conforme apresentação em anexo'.

PALAVRA ABERTA E ENCERRAMENTO — REGRAS ESTRITAS

Cada pessoa que se manifestou = um bullet separado. NUNCA misture falas de pessoas diferentes no mesmo bullet.

Registre APENAS manifestações com conteúdo substantivo novo. NÃO registre: pedidos de desculpas por atraso, confirmações de presença em eventos futuros, agradecimentos genéricos, repetições de pontos já registrados em seções anteriores. Se um membro repete na PALAVRA ABERTA algo que já disse na seção temática, NÃO duplique. A PALAVRA ABERTA deve ter entre 3 e 6 bullets no máximo.

ERRADO (tudo junto):
'bullets': [
  'O Sr. Oscar Simonsen informou que precisaria sair às 17h15. O Sr. Gustavo Bado também comunicou saída às 17h45. A reunião foi encerrada.'
]

CORRETO (separado por pessoa):
'bullets': [
  'O Sr. Oscar Simonsen informou necessidade de saída antecipada às 17h15 devido a compromisso externo, permanecendo conectado via dispositivo móvel.',
  'O Sr. Gustavo Bado comunicou necessidade de saída às 17h45 para atender compromisso profissional.',
  'Não havendo outras manifestações, a reunião foi encerrada pelo Sr. Ilso Oliveira, com orientação para acompanhamento das próximas atividades pelos canais oficiais da COIC.'
]

COMPLETUDE — NÃO CORTE INFORMAÇÃO

Todas as informações relevantes mencionadas na transcrição devem ser registradas. NÃO omita detalhes por brevidade. Se o apresentador mencionou um desdobramento, uma justificativa ou uma consequência, registre. Se mencionou entidades parceiras, nomes de apoiadores ou detalhes operacionais, registre. A súmula é um documento oficial e deve ser COMPLETA.

CONSISTÊNCIA NUMÉRICA: Se o texto mencionar uma quantidade (ex: 5 painéis, 3 projetos, 6 hubs), TODOS os itens devem ser listados nos sub-bullets. Se mencionou 5 painéis, liste os 5. Se a transcrição não detalha todos, registre os que foram mencionados e indique os demais como 'além de [N] outros painéis a serem detalhados posteriormente'.

SEÇÕES BREVES: Mesmo que um tema tenha sido tratado brevemente na reunião, a seção correspondente deve conter NO MÍNIMO 2 bullets. Se a transcrição traz pouca informação, o primeiro bullet registra o que foi dito e o segundo registra o status ou encaminhamento. Exemplo: primeiro bullet com o relato factual, segundo bullet com 'O documento encontra-se em fase de finalização, aguardando as últimas contribuições para posterior divulgação.'

ESTILO DE REDAÇÃO — PADRÃO INSTITUCIONAL

A súmula é um documento institucional formal. O texto deve ter tom de registro técnico, com frases bem construídas, orações subordinadas encadeadas e conectivos variados. NÃO escreva frases curtas e diretas como texto jornalístico. Escreva parágrafos densos como um relatório institucional.

Cada bullet deve ter entre 3 e 6 linhas, usando construções como:
- Orações subordinadas: 'informou que...', 'destacando que...', 'com referência a...', 'o que poderia...'
- Conectivos técnicos: 'com referência adicional a', 'a fim de preservar', 'dada a capilaridade', 'condicionadas a enquadramentos', 'visando aprimorar', 'conforme indicado'
- Ressalvas e condicionais: 'ainda que marcos tenham início em...', 'o que poderia excluir...', 'dependendo do desenho contratual...'

ERRADO (jornalístico, frases soltas):
'O evento funcionará das 10h00 às 18h00. Será um evento pago. Tem descontos para associados.'

CORRETO (institucional, encadeado):
'Foi confirmada a realização do evento entre os dias 19 e 21 de maio no Distrito Anhembi em São Paulo, mantendo o formato presencial sem transmissão online ao vivo, diferentemente da edição anterior. O evento funcionará das 10h00 às 18h00 em cada um dos três dias, independentemente da FEICON que ocorrerá em abril, sendo um evento pago com descontos especiais para empresas associadas à CBIC (conforme informado).'

VARIAÇÃO DE VERBOS INTRODUTÓRIOS: NÃO repita o mesmo verbo em bullets consecutivos. Alterne entre: 'apresentou', 'informou', 'registrou', 'destacou', 'ressaltou', 'esclareceu', 'contextualizou', 'detalhou', 'indicou', 'mencionou', 'comunicou', 'relatou', 'reforçou'. Se usou 'informou' num bullet, use 'destacou' ou 'registrou' no seguinte.

REGISTRO DE DEBATES: Quando houver pergunta e resposta entre membros, registre com a estrutura: 'O Sr. [nome] questionou [tema] e o Sr. [nome] esclareceu que [resposta], indicando que [desdobramento] (conforme respondido).' Cada interação relevante merece um bullet próprio.

QUALIFICADORES VARIADOS: NÃO repita sempre 'conforme apresentado'. Alterne entre: '(conforme mencionado)', '(conforme registrado)', '(conforme informado)', '(conforme respondido)', '(conforme citado na reunião)', '(conforme listado na apresentação)'.

Verbos no pretérito perfeito. Encaminhamentos com responsável e prazo quando disponíveis: 'Ação — Responsável: Nome — Prazo: DD/MM/AAAA'. Se informação ambígua, omitir em vez de inventar. NÃO repetir a mesma informação em seções diferentes.

O QUE NÃO INCLUIR

- NÃO gere cabeçalho, número da reunião, data, local ou lista de presentes
- NÃO gere seção 'ANEXO' ou 'ANEXOS'
- NÃO inclua texto fora do JSON
- NÃO use markdown dentro do JSON (sem **, ##, etc.)
- NÃO use aspas de nenhum tipo (simples, duplas ou com barra invertida) dentro do texto dos bullets para citar nomes de painéis, eventos ou documentos. Escreva o nome diretamente sem delimitadores. Exemplo ERRADO: 'painel sobre *Do mapeamento à prática*'. Exemplo CORRETO: 'painel Do mapeamento à prática: como as empresas da construção estão transformando ESG em ação'`;

const uid = () => "m" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const norm = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

function cleanTeamsName(raw) {
  let s = raw;
  s = s.replace(/\s*\([^)]*\)\s*/g, " ");
  s = s.replace(/^[A-Z]{2,10}\s*-\s*/i, "");
  s = s.replace(/\s*\|[^|]*$/g, "");
  s = s.replace(/\s+-\s+[A-Z][A-Z\-]+\s*$/g, "");
  s = s.replace(/\s+(SME|SINDUSCON[\w-]*)\s*$/gi, "");
  return s.trim();
}

function nameTokens(s) { return norm(s).split(/[\s\-\.]+/).filter((t) => t.length > 1 && !["de", "da", "do", "dos", "das", "e"].includes(t)); }
function tokenOverlap(a, b) { let h = 0; for (const x of a) for (const y of b) { if (x === y || (x.length > 3 && y.length > 3 && (x.includes(y) || y.includes(x)))) { h++; break; } } return h; }

function matchTeamsCSV(rows, membros) {
  const pm = {}; const matched = new Set(); membros.forEach((m) => (pm[m.id] = false));
  for (const row of rows) { if (!row.email) continue; const e = row.email.toLowerCase().trim(); for (const m of membros) { if (matched.has(m.id)) continue; if (m.email && m.email.toLowerCase().trim() === e) { pm[m.id] = true; matched.add(m.id); row._m = true; break; } } }
  for (const row of rows) {
    if (row._m) continue; const c = cleanTeamsName(row.name); const rt = nameTokens(c); if (!rt.length) continue;
    let best = null, bs = 0;
    for (const m of membros) {
      if (matched.has(m.id)) continue; const mt = nameTokens(m.nome); if (!mt.length) continue;
      const ov = tokenOverlap(rt, mt); const sc = ov / Math.min(rt.length, mt.length);
      const fn = mt[0] && rt[0] && (mt[0] === rt[0] || mt[0].includes(rt[0]) || rt[0].includes(mt[0]));
      const cf = norm(row.name); const em = m.empresa && norm(m.empresa).split(/\s+/).some((e) => e.length > 2 && cf.includes(e));
      if (ov >= 2 || (sc >= 0.8 && ov >= 1)) { if (sc > bs) { bs = sc; best = m; } }
      else if (ov === 1 && em && fn) { if (0.7 > bs) { bs = 0.7; best = m; } }
      else if (fn && em && mt.length <= 2) { if (0.65 > bs) { bs = 0.65; best = m; } }
    }
    if (best) { pm[best.id] = true; matched.add(best.id); row._m = true; }
  }
  const seen = new Set(); const un = []; const bot = /fireflies|read\.ai|notetaker|bot/i;
  for (const r of rows) { if (r._m) continue; const c = cleanTeamsName(r.name); if (!c || c.length < 2 || bot.test(r.name)) continue; const k = norm(c); if (seen.has(k)) continue; seen.add(k); un.push({ name: c, email: r.email || "" }); }
  return { pm, un };
}

function parseTeamsCSV(text) {
  const lines = text.split(/\r?\n/); const rows = []; let inP = false, hdr = false, nc = 0, ec = -1;
  for (const line of lines) {
    const cols = line.split("\t");
    if (!inP) { if (/participantes/i.test(cols[0])) { inP = true; continue; } if (/^nome$/i.test(cols[0]?.trim())) { inP = true; hdr = true; nc = 0; ec = cols.findIndex((c) => /email/i.test(c)); continue; } }
    else if (!hdr) { if (/^nome$/i.test(cols[0]?.trim())) { hdr = true; nc = 0; ec = cols.findIndex((c) => /email/i.test(c)); continue; } }
    else { const n = cols[nc]?.trim(); if (n && n.length > 1) rows.push({ name: n, email: ec >= 0 ? cols[ec]?.trim() || "" : "" }); }
  }
  if (!rows.length) for (const l of lines) { const c = l.split(/[,;\t]/); const n = c[0]?.replace(/"/g, "").trim(); if (n && n.length > 2 && !/^(nome|name|titulo|participantes)/i.test(n)) rows.push({ name: n, email: "" }); }
  const dd = new Map(); for (const r of rows) { const k = norm(r.name); if (!dd.has(k)) dd.set(k, r); else if (r.email && !dd.get(k).email) dd.get(k).email = r.email; }
  return [...dd.values()];
}

async function callAI(settings, messages) {
  const { provider, model, apiKey } = settings;
  // Use backend proxy to avoid CORS issues
  const resp = await fetch("/api/ai/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ provider: provider || "anthropic", model: model || "claude-sonnet-4-20250514", apiKey: apiKey, messages: messages }),
  });
  const d = await resp.json();
  if (d.error) throw new Error(d.error.message || d.error);
  // Anthropic format
  if (d.content) return d.content.map(function(i) { return i.text || ""; }).join("");
  // OpenAI format
  if (d.choices) return d.choices[0].message.content || "";
  return "";
}

    t += `Objetivo: ${reuniao.edicao ? reuniao.edicao + " — " : ""}${nomeR}\n`;
    t += `\n${"═".repeat(56)}\n\n`;
    // Seções (inclui INFORMES como primeira e ENCERRAMENTO como última)
    sumula.secoes?.forEach((s) => {
      t += `${s.titulo}\n\n`;
      s.bullets?.forEach((b) => {
        if (b.indexOf('>> ') === 0) t += `    ◦ ${b.substring(3)}\n\n`;
        else t += `  • ${b}\n\n`;
      });
    });
    // Quórum
    t += `${"─".repeat(56)}\nQUÓRUM\n\n`;
    t += `${"Nome".padEnd(30)}${"Empresa".padEnd(20)}Presença\n`;
    t += `${"─".repeat(56)}\n`;
    membros.forEach((m) => { t += `${m.nome.padEnd(30)}${m.empresa.padEnd(20)}${presencas[m.id] ? "✓ Presente" : "— Ausente"}\n`; });
    t += `\nTotal: ${qr.pres}/${qr.total} (${qr.pct}%)\n\n`;
    t += `${"─".repeat(56)}\n`;
    t += `As contribuições e retificações a esta súmula devem ser enviadas para coic@cbic.org.br, preferencialmente, em até 48 horas após o seu recebimento. A não manifestação implica na aceitação da Súmula.\n\n`;
    t += `Súmula elaborada por:\nAlexandre Nícolas Dantas dos Santos\nGestor de Projetos da COIC\n`;
    return t;
  };

  // ═══ SETTINGS PANEL ═══
  if (showSettings) {
    const prov = AI_PROVIDERS.find((p) => p.id === aiSettings.provider);
    return (
      <div style={{ fontFamily: "var(--font-sans)", color: "var(--color-text-primary)", maxWidth: 640, margin: "0 auto", padding: "2rem 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "1.5rem" }}>
          <button onClick={() => setShowSettings(false)} style={{ border: "none", background: "none", padding: 4, cursor: "pointer", color: "var(--color-text-secondary)" }}><Ic d={ic.chevL} size={20} /></button>
          <h1 style={{ fontSize: 20, fontWeight: 500, margin: 0 }}>Configurações da IA</h1>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div>
            <label style={lbl}>Provedor de IA</label>
            <div style={{ display: "flex", gap: 8 }}>
              {AI_PROVIDERS.map((p) => (
                <button key={p.id} onClick={() => saveAiSettings({ ...aiSettings, provider: p.id, model: p.models[0] })}
                  style={{ flex: 1, padding: "10px 8px", fontSize: 13, borderRadius: "var(--border-radius-md)", border: aiSettings.provider === p.id ? "2px solid var(--color-text-info)" : "0.5px solid var(--color-border-tertiary)", background: aiSettings.provider === p.id ? "var(--color-background-info)" : "var(--color-background-primary)", fontWeight: aiSettings.provider === p.id ? 500 : 400, cursor: "pointer" }}>
                  {p.name}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={lbl}>Modelo</label>
            <select value={aiSettings.model} onChange={(e) => saveAiSettings({ ...aiSettings, model: e.target.value })} style={{ width: "100%", boxSizing: "border-box" }}>
              {prov?.models.map((m) => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Chave da API {aiSettings.provider === "anthropic" && <span style={{ color: "var(--color-text-tertiary)" }}>(opcional no claude.ai)</span>}</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input type={showApiKey ? "text" : "password"} value={aiSettings.apiKey} onChange={(e) => saveAiSettings({ ...aiSettings, apiKey: e.target.value })} placeholder={aiSettings.provider === "anthropic" ? "Deixe vazio para usar dentro do claude.ai" : "sk-..."} style={{ flex: 1, boxSizing: "border-box" }} />
              <button onClick={() => setShowApiKey(!showApiKey)} style={{ padding: "0 10px" }}><Ic d={ic.eye} size={16} /></button>
            </div>
          </div>
          <div>
            <label style={lbl}>Instruções para a IA (como ela deve gerar a súmula)</label>
            <textarea value={aiSettings.instructions} onChange={(e) => saveAiSettings({ ...aiSettings, instructions: e.target.value })} rows={14} style={{ width: "100%", boxSizing: "border-box", fontFamily: "var(--font-mono)", fontSize: 12, lineHeight: 1.6 }} />
            <button onClick={() => saveAiSettings({ ...aiSettings, instructions: DEFAULT_INSTRUCTIONS })} style={{ fontSize: 11, marginTop: 6, color: "var(--color-text-tertiary)" }}>Restaurar instruções padrão</button>
          </div>
        </div>
        <div style={{ marginTop: 20, padding: "12px 16px", borderRadius: "var(--border-radius-md)", background: "var(--color-background-info)", fontSize: 12, color: "var(--color-text-info)" }}>
          As configurações são salvas automaticamente e persistem entre sessões.
        </div>
      </div>
    );
  }

  // ═══ GT SELECTOR ═══
  if (!selGtId) {
    return (
      <div style={{ fontFamily: "var(--font-sans)", color: "var(--color-text-primary)", maxWidth: 640, margin: "0 auto", padding: "2rem 0" }}>
        <div style={{ marginBottom: "2rem", textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
            <button onClick={() => setShowSettings(true)} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "var(--color-text-secondary)" }}>
              <Ic d={ic.gear} size={16} /> Configurar IA
            </button>
          </div>
          <div style={{ width: 56, height: 56, borderRadius: "var(--border-radius-lg)", background: "linear-gradient(135deg, #185FA5 0%, #0F6E56 100%)", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
            <span style={{ fontWeight: 500, fontSize: 20, color: "#fff", letterSpacing: "-0.02em" }}>SC</span>
          </div>
          <h1 style={{ fontSize: 22, fontWeight: 500, margin: "0 0 4px" }}>Súmulas COIC</h1>
          <p style={{ fontSize: 14, color: "var(--color-text-secondary)", margin: 0 }}>Gerador inteligente de súmulas — CBIC</p>
          {aiSettings.provider !== "anthropic" && (
            <div style={{ fontSize: 11, color: "var(--color-text-info)", marginTop: 6 }}>IA: {AI_PROVIDERS.find((p) => p.id === aiSettings.provider)?.name} ({aiSettings.model})</div>
          )}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
          {gts.map((g) => (
            <div key={g.id} onClick={() => setSelGtId(g.id)}
              style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", cursor: "pointer", transition: "border-color 0.15s" }}
              onMouseEnter={(e) => (e.currentTarget.style.borderColor = "var(--color-border-secondary)")} onMouseLeave={(e) => (e.currentTarget.style.borderColor = "var(--color-border-tertiary)")}>
              <div style={{ width: 40, height: 40, borderRadius: "var(--border-radius-md)", background: "var(--color-background-secondary)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Ic d={ic.users} size={18} color="var(--color-text-secondary)" /></div>
              <div style={{ flex: 1 }}><div style={{ fontSize: 15, fontWeight: 500 }}>{g.nome}</div><div style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>{g.descricao ? g.descricao + " · " : ""}{g.membros.length} membros</div></div>
              <Ic d={ic.chevR} size={18} color="var(--color-text-tertiary)" />
            </div>
          ))}
        </div>
        {!showNewGt ? (
          <button onClick={() => setShowNewGt(true)} style={{ width: "100%", padding: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, borderStyle: "dashed" }}><Ic d={ic.plus} size={16} /> Novo grupo de trabalho</button>
        ) : (
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: 16 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div><label style={lbl}>Nome</label><input value={newGt.nome} onChange={(e) => setNewGt({ ...newGt, nome: e.target.value })} placeholder="Ex: GT de Valorização da Engenharia" style={{ width: "100%", boxSizing: "border-box" }} /></div>
              <div><label style={lbl}>Descrição</label><input value={newGt.descricao} onChange={(e) => setNewGt({ ...newGt, descricao: e.target.value })} style={{ width: "100%", boxSizing: "border-box" }} /></div>
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                <button onClick={() => setShowNewGt(false)}>Cancelar</button>
                <button onClick={() => { if (!newGt.nome.trim()) return; const g = { id: "gt-" + Date.now().toString(36), nome: newGt.nome.trim(), descricao: newGt.descricao.trim(), membros: [] }; setGts((p) => [...p, g]); setSelGtId(g.id); setShowNewGt(false); setNewGt({ nome: "", descricao: "" }); }}>Criar</button>
              </div>
            </div>
          </div>
        )}
        <div style={{ marginTop: "2rem", fontSize: 11, color: "var(--color-text-tertiary)", textAlign: "center" }}>Gestor de Projetos COIC — coic@cbic.org.br</div>
      </div>
    );
  }

  // ═══ MAIN VIEW ═══
  const grupos = [...new Set(membros.map((m) => m.grupo || "Sem grupo"))].sort();
  return (
    <div style={{ fontFamily: "var(--font-sans)", color: "var(--color-text-primary)", maxWidth: 780, margin: "0 auto", padding: "1rem 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "1.25rem" }}>
        <button onClick={() => setSelGtId(null)} style={{ border: "none", background: "none", padding: 4, cursor: "pointer", color: "var(--color-text-secondary)" }}><Ic d={ic.chevL} size={20} /></button>
        <div style={{ flex: 1 }}><h1 style={{ fontSize: 18, fontWeight: 500, margin: 0 }}>{gt?.nome}</h1><p style={{ fontSize: 12, color: "var(--color-text-tertiary)", margin: 0 }}>{gt?.descricao || `${membros.length} membros`}</p></div>
      </div>
      <div style={{ display: "flex", gap: 0, marginBottom: "1.25rem", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
        {tabLabels.map((l, i) => (<button key={i} onClick={() => setTab(i)} style={{ flex: 1, padding: "10px 4px", fontSize: 13, fontWeight: tab === i ? 500 : 400, color: tab === i ? "var(--color-text-info)" : "var(--color-text-secondary)", background: "transparent", border: "none", borderBottom: tab === i ? "2px solid var(--color-text-info)" : "2px solid transparent", cursor: "pointer", marginBottom: -1 }}>{l}</button>))}
      </div>
      {error && (<div style={{ padding: "10px 14px", marginBottom: "1rem", borderRadius: "var(--border-radius-md)", background: "var(--color-background-danger)", color: "var(--color-text-danger)", fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}><Ic d={ic.alert} size={16} /><span style={{ flex: 1 }}>{error}</span><button onClick={() => setError("")} style={{ border: "none", background: "none", cursor: "pointer", color: "var(--color-text-danger)" }}><Ic d={ic.x} size={14} /></button></div>)}

      {tab === 0 && (<div><h2 style={{ fontSize: 16, fontWeight: 500, marginBottom: 16 }}>Dados da reunião</h2><div style={{ display: "flex", flexDirection: "column", gap: 14 }}><div><label style={lbl}>Nome da reunião</label><input value={reuniao.nome} onChange={(e) => setReuniao({ ...reuniao, nome: e.target.value })} onBlur={(e) => saveField('reuniao_nome', e.target.value)} list="dl_reuniao_nome" placeholder="Ex: Reunião Ordinária do CIE-COIC" style={{ width: "100%", boxSizing: "border-box" }} /><datalist id="dl_reuniao_nome">{(fieldHistory.reuniao_nome || []).map((v, i) => <option key={i} value={v} />)}</datalist></div><div><label style={lbl}>Edição / número</label><input value={reuniao.edicao} onChange={(e) => setReuniao({ ...reuniao, edicao: e.target.value })} onBlur={(e) => saveField('reuniao_edicao', e.target.value)} list="dl_reuniao_edicao" placeholder="Ex: 57ª Reunião" style={{ width: "100%", boxSizing: "border-box" }} /><datalist id="dl_reuniao_edicao">{(fieldHistory.reuniao_edicao || []).map((v, i) => <option key={i} value={v} />)}</datalist></div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}><div><label style={lbl}>Data</label><input type="date" value={reuniao.data} onChange={(e) => setReuniao({ ...reuniao, data: e.target.value })} style={{ width: "100%", boxSizing: "border-box" }} /></div><div><label style={lbl}>Horário</label><input value={reuniao.horario} onChange={(e) => setReuniao({ ...reuniao, horario: e.target.value })} onBlur={(e) => saveField('reuniao_horario', e.target.value)} list="dl_reuniao_horario" placeholder="16h30 às 18h00" style={{ width: "100%", boxSizing: "border-box" }} /><datalist id="dl_reuniao_horario">{(fieldHistory.reuniao_horario || []).map((v, i) => <option key={i} value={v} />)}</datalist></div></div><div><label style={lbl}>Local</label><input value={reuniao.local} onChange={(e) => setReuniao({ ...reuniao, local: e.target.value })} onBlur={(e) => saveField('reuniao_local', e.target.value)} list="dl_reuniao_local" style={{ width: "100%", boxSizing: "border-box" }} /><datalist id="dl_reuniao_local">{(fieldHistory.reuniao_local || []).map((v, i) => <option key={i} value={v} />)}</datalist></div><div><label style={lbl}>Pauta da reunião</label>{pautaRaw ? (<div><textarea value={reuniao.pauta_texto} onChange={(e) => setReuniao({ ...reuniao, pauta_texto: e.target.value })} rows={6} placeholder={'Cole a pauta aqui. Exemplos de formatos aceitos:\n\n16h30 – 17h00 | Título do item\n16h30 | Título do item\n1. Título do item\nTítulo do item'} style={{ width: '100%', boxSizing: 'border-box', fontFamily: 'var(--font-mono)', fontSize: 12, lineHeight: 1.6 }} /><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 6 }}><div style={{ fontSize: 11, color: 'var(--color-text-tertiary)' }}>Cole o texto da pauta e clique em Identificar</div><button onClick={() => { var text = reuniao.pauta_texto || ''; if (!text.trim()) return; var items = []; var lines = text.split('\n'); for (var li = 0; li < lines.length; li++) { var ln = lines[li].trim(); if (!ln) continue; var m = ln.match(/^(\d{1,2}[h:]\d{2}\s*[–\-]\s*\d{1,2}[h:]\d{2})\s*[\|]\s*(.+)/); if (m) { var item = { horario: m[1].trim(), titulo: m[2].trim(), apresentador: '' }; if (li + 1 < lines.length && /apresenta/i.test(lines[li + 1])) { item.apresentador = lines[li + 1].replace(/^apresenta[çc][ãa]o\s+(de\s+)?/i, '').trim(); li++; } items.push(item); continue; } var m2 = ln.match(/^(\d{1,2}[h:]\d{2})\s*[–\-\|]\s*(.+)/); if (m2) { var item2 = { horario: m2[1].trim(), titulo: m2[2].trim(), apresentador: '' }; if (li + 1 < lines.length && /apresenta/i.test(lines[li + 1])) { item2.apresentador = lines[li + 1].replace(/^apresenta[çc][ãa]o\s+(de\s+)?/i, '').trim(); li++; } items.push(item2); continue; } if (/apresenta/i.test(ln)) continue; items.push({ horario: '', titulo: ln.replace(/^\d+[\.\)\-]\s*/, ''), apresentador: '' }); } if (items.length > 0) { setPautaItems(items); setPautaRaw(false); } }} style={{ fontSize: 12, padding: '6px 14px', display: 'flex', alignItems: 'center', gap: 6 }}><Ic d={ic.check} size={14} /> Identificar itens</button></div></div>) : (<div><div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>{pautaItems.map((item, idx) => (<div key={idx} style={{ background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '10px 12px' }}><div style={{ display: 'flex', gap: 8, marginBottom: 6 }}><input value={item.horario} onChange={(e) => { var nv = [...pautaItems]; nv[idx] = { ...nv[idx], horario: e.target.value }; setPautaItems(nv); }} placeholder='16h30 – 17h00' style={{ width: 140, fontSize: 12, fontFamily: 'var(--font-mono)' }} /><input value={item.titulo} onChange={(e) => { var nv = [...pautaItems]; nv[idx] = { ...nv[idx], titulo: e.target.value }; setPautaItems(nv); }} placeholder='Título do item' style={{ flex: 1, fontSize: 12 }} /><button onClick={() => setPautaItems(pautaItems.filter((_, i) => i !== idx))} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--color-text-tertiary)', padding: 2 }}><Ic d={ic.x} size={14} /></button></div><div style={{ display: 'flex', alignItems: 'center', gap: 6 }}><span style={{ fontSize: 11, color: 'var(--color-text-tertiary)', whiteSpace: 'nowrap' }}>Apresentação de</span><input value={item.apresentador} onChange={(e) => { var nv = [...pautaItems]; nv[idx] = { ...nv[idx], apresentador: e.target.value }; setPautaItems(nv); }} onBlur={(e) => saveField('apresentador', e.target.value)} list='dl_apresentador' placeholder='Nome do apresentador (opcional)' style={{ flex: 1, fontSize: 12 }} /><datalist id='dl_apresentador'>{(fieldHistory.apresentador || []).map((v, i) => <option key={i} value={v} />)}</datalist></div></div>))}</div><div style={{ display: 'flex', gap: 8, marginTop: 8 }}><button onClick={() => setPautaItems([...pautaItems, { horario: '', titulo: '', apresentador: '' }])} style={{ fontSize: 12, padding: '6px 12px', display: 'flex', alignItems: 'center', gap: 6, borderStyle: 'dashed' }}><Ic d={ic.plus} size={14} /> Adicionar item</button><button onClick={() => { setPautaRaw(true); }} style={{ fontSize: 12, padding: '6px 12px', color: 'var(--color-text-secondary)' }}>Voltar ao texto</button></div></div>)}</div></div></div>)}

      {tab === 1 && (<div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}><h2 style={{ fontSize: 16, fontWeight: 500, margin: 0 }}>Lista de presença</h2><div><input ref={excelRef} type="file" accept=".csv,.xlsx,.xls,.txt" onChange={handleExcel} style={{ display: "none" }} /><button onClick={() => excelRef.current?.click()} style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}><Ic d={ic.upload} size={14} /> Importar Excel/CSV</button></div></div>
        {matchLog && <div style={{ padding: "8px 12px", marginBottom: 12, borderRadius: "var(--border-radius-md)", background: "var(--color-background-info)", color: "var(--color-text-info)", fontSize: 12 }}>{matchLog}</div>}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 16 }}>{[{ l: "Total", v: qr.total, c: "var(--color-text-secondary)" }, { l: "Presentes", v: qr.pres, c: "var(--color-text-success)" }, { l: "Ausentes", v: qr.aus, c: "var(--color-text-danger)" }, { l: "Quórum", v: `${qr.pct}%`, c: qr.ok ? "var(--color-text-success)" : "var(--color-text-danger)" }].map((x, i) => (<div key={i} style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "8px 10px", textAlign: "center" }}><div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginBottom: 2 }}>{x.l}</div><div style={{ fontSize: 18, fontWeight: 500, color: x.c }}>{x.v}</div></div>))}</div>
        {unmatched.length > 0 && (<div style={{ background: "var(--color-background-warning)", border: "0.5px solid var(--color-border-warning)", borderRadius: "var(--border-radius-lg)", padding: "12px 16px", marginBottom: 16 }}><div style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-warning)", marginBottom: 8 }}>{unmatched.length} não identificado{unmatched.length > 1 ? "s" : ""}</div>{unmatched.map((u, idx) => (<div key={idx} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 0", borderBottom: idx < unmatched.length - 1 ? "0.5px solid var(--color-border-warning)" : "none", gap: 8 }}><div><div style={{ fontSize: 13 }}>{u.name}</div>{u.email && <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{u.email}</div>}</div><div style={{ display: "flex", gap: 6, flexShrink: 0 }}><button onClick={() => { setFormMode({ type: "add", unmIdx: idx }); setFormData({ nome: u.name, email: u.email || "", telefone: "", empresa: "", funcao: "", grupo: "" }); }} style={{ fontSize: 11, padding: "4px 10px" }}>Incluir</button><button onClick={() => setUnmatched((p) => p.filter((_, i) => i !== idx))} style={{ border: "none", background: "none", cursor: "pointer", color: "var(--color-text-tertiary)", padding: 2 }}><Ic d={ic.x} size={14} /></button></div></div>))}</div>)}
        {formMode && <MembroForm data={formData} onChange={setFormData} title={formMode.type === "edit" ? "Editar membro" : "Incluir novo membro"} saveLabel={formMode.type === "edit" ? "Atualizar" : "Salvar no GT"} onCancel={() => setFormMode(null)} onSave={() => { if (formMode.type === "edit") updateMembro(formMode.membroId, formData); else addMembro(formData, formMode.unmIdx); }} />}
        {grupos.map((g) => { const gm = membros.filter((m) => (m.grupo || "Sem grupo") === g); return (<div key={g} style={{ marginBottom: 14 }}><div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4, padding: "0 4px" }}>{g} ({gm.filter((m) => presencas[m.id]).length}/{gm.length})</div>{gm.map((m) => (<div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px", borderRadius: "var(--border-radius-md)", background: presencas[m.id] ? "var(--color-background-success)" : "transparent", transition: "background 0.1s" }}><div onClick={() => setPresencas((p) => ({ ...p, [m.id]: !p[m.id] }))} style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: "pointer", minWidth: 0 }}><Check checked={presencas[m.id]} /><div style={{ minWidth: 0 }}><div style={{ fontSize: 14, fontWeight: presencas[m.id] ? 500 : 400 }}>{m.nome_completo || m.nome}</div><div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{m.empresa}{m.funcao ? ` · ${m.funcao}` : ""}</div></div></div><button onClick={(e) => { e.stopPropagation(); setFormMode({ type: "edit", membroId: m.id }); setFormData({ nome: m.nome, nome_completo: m.nome_completo || "", email: m.email || "", telefone: m.telefone || "", empresa: m.empresa || "", funcao: m.funcao || "", grupo: m.grupo || "" }); }} style={{ border: "none", background: "none", cursor: "pointer", color: "var(--color-text-tertiary)", padding: 4, flexShrink: 0, opacity: 0.4 }}><Ic d={ic.edit} size={14} /></button></div>))}</div>); })}

<div style={{ marginBottom: '16px', padding: '16px', border: '2px dashed #ccc', borderRadius: '8px', backgroundColor: slideImages.length > 0 ? '#f0fff0' : '#fafafa' }}>

</div>
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}><button onClick={async () => { setLoading(true); setError(""); try { var fmtDate = function(d) { if (!d) return ""; if (d.indexOf("/") >= 0) return d; var p = d.split("-"); return p.length === 3 ? p[2]+"/"+p[1]+"/"+p[0] : d; }; var hi = reuniao.horario ? reuniao.horario.split(" às ")[0] || "16h00" : "16h00"; var hf = reuniao.horario ? reuniao.horario.split(" às ")[1] || "18h00" : "18h00"; try { var meetResp = await fetch("/api/gts/" + selGtId + "/reunioes", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nome: reuniao.nome || gt.nome, edicao: reuniao.edicao || "", data: reuniao.data, horario: reuniao.horario, local: reuniao.local }) }); var meetData = await meetResp.json(); if (meetData.id) { await fetch("/api/reunioes/" + meetData.id + "/presencas", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ presencas: presencas }) }); } } catch(e) { console.log("Nao salvou reuniao:", e); } var qr = gt?.membros ? gt.membros.map(function(m) { return { nome: m.nome_completo || m.nome, entidade: m.empresa || "", total_reunioes: "1", presencas: presencas[m.id] ? "1" : "0", percentual: presencas[m.id] ? "100%" : "0%" }; }) : []; var resp = await fetch("/api/generate-sumula", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ data: { data: fmtDate(reuniao.data), horario_inicio: hi, horario_fim: hf, local: reuniao.local, objetivo: (reuniao.edicao || "") + " " + (reuniao.nome || gt?.nome || "Reunião"), numero_reuniao: reuniao.edicao ? (reuniao.edicao.match(/\d+/) || [""])[0] : "", titulo_reuniao: (reuniao.nome || gt?.nome || "REUNIÃO").toUpperCase(), informes: "", pauta: (!pautaRaw && pautaItems.length > 0) ? pautaItems.filter(function(p) { return p.titulo; }) : (function() { if (!reuniao.pauta_texto) return []; var items = []; var lines = reuniao.pauta_texto.split('\n'); for (var li = 0; li < lines.length; li++) { var ln = lines[li].trim(); if (!ln) continue; var m = ln.match(/^(\d{1,2}[h:]\d{2}\s*[–\-]\s*\d{1,2}[h:]\d{2})\s*[\|]\s*(.+)/); if (m) { var item = { horario: m[1].trim(), titulo: m[2].trim(), apresentador: '' }; if (li + 1 < lines.length && /apresenta/i.test(lines[li + 1])) { item.apresentador = lines[li + 1].replace(/^apresenta[çc][ãa]o\s+(de\s+)?/i, '').trim(); li++; } items.push(item); continue; } var m2 = ln.match(/^(\d{1,2}[h:]\d{2})\s*[–\-\|]\s*(.+)/); if (m2) { var item2 = { horario: m2[1].trim(), titulo: m2[2].trim(), apresentador: '' }; if (li + 1 < lines.length && /apresenta/i.test(lines[li + 1])) { item2.apresentador = lines[li + 1].replace(/^apresenta[çc][ãa]o\s+(de\s+)?/i, '').trim(); li++; } items.push(item2); continue; } if (/^apresenta/i.test(ln)) continue; items.push({ horario: '', titulo: ln.replace(/^\d+[\.\)\-]\s*/, ''), apresentador: '' }); } return items; })(), secoes: (sumula?.secoes || []).map(function(s) { return { titulo_secao: s.titulo || s.titulo_secao || "", conteudo_secao: s.conteudo_secao || (s.bullets ? s.bullets.join("\n") : "") }; }), quorum: qr, ano: String(new Date().getFullYear()), anexo_images: slideImages.map(function(img) { return img.path || img; }) }, gtId: selGtId }) }); if (!resp.ok) throw new Error("Erro ao gerar Word"); var blob = await resp.blob(); var url = URL.createObjectURL(blob); var a = document.createElement("a"); a.href = url; a.download = "Sumula_" + (reuniao.edicao || "reuniao") + "_" + fmtDate(reuniao.data).replace(/\//g, "-") + ".docx"; a.click(); URL.revokeObjectURL(url); setSlideImages([]); setSlideFile(null); if (slideRef.current) slideRef.current.value = ''; } catch(err) { setError("Erro: " + err.message); } finally { setLoading(false); } }} disabled={loading} style={{ padding: 16, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, borderRadius: "var(--border-radius-lg)", opacity: loading ? 0.5 : 1 }}><Ic d={ic.download} size={24} /><span style={{ fontSize: 13, fontWeight: 500 }}>{loading ? "Gerando..." : "Baixar Word"}</span><span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>Template CBIC</span></button><button onClick={() => { var t = exportarTexto(); if (t) { navigator.clipboard.writeText(t); setCopied(true); setTimeout(function() { setCopied(false); }, 2000); } }} style={{ padding: 16, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, borderRadius: "var(--border-radius-lg)" }}><Ic d={copied ? ic.check : ic.clipboard} size={24} /><span style={{ fontSize: 13, fontWeight: 500 }}>{copied ? "Copiado!" : "Copiar texto"}</span><span style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>Para e-mail</span></button></div><div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "12px 16px" }}><div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 6 }}>Prévia</div><pre style={{ fontSize: 11, fontFamily: "var(--font-mono)", whiteSpace: "pre-wrap", lineHeight: 1.6, color: "var(--color-text-secondary)", maxHeight: 280, overflow: "auto", margin: 0 }}>{exportarTexto()}</pre></div></>)}</div>)}

            </div>

              <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--color-text-secondary)', marginBottom: 6 }}>Presenças registradas:</div>
              {reuniaoPresencas.length === 0 && <div style={{ fontSize: 12, color: 'var(--color-text-tertiary)' }}>Nenhuma presença registrada</div>}
              {reuniaoPresencas.map(function(p) { return (<div key={p.membro_id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '3px 0', fontSize: 12 }}>
                <span style={{ color: p.presente ? 'var(--color-text-success)' : 'var(--color-text-danger)', fontWeight: 500 }}>{p.presente ? '✓' : '✗'}</span>
                <span>{p.nome_completo || p.nome}</span>
              </div>); })}
            </div>)}
          </div>);
        })}
      </div>)}

      <div style={{ marginTop: "1.5rem", paddingTop: "0.75rem", borderTop: "0.5px solid var(--color-border-tertiary)", fontSize: 11, color: "var(--color-text-tertiary)", textAlign: "center" }}>Gestor de Projetos COIC — coic@cbic.org.br</div>
